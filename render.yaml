services:
  - type: web
    name: ecosystem-human-bot
    runtime: python
    repo: https://github.com/ВАШ_АККАУНТ/НАЗВАНИЕ_РЕПОЗИТОРИЯ
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
